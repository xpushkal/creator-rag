services:
  db:
    image: pgvector/pgvector:pg16
    container_name: creator-rag-db
    environment:
      POSTGRES_USER: creator
      POSTGRES_PASSWORD: creator
      POSTGRES_DB: creator_rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creator -d creator_rag"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
