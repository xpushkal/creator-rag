# Render Blueprint for the FastAPI backend (Docker).
# Create → "Blueprint" in Render and point it at this repo; it reads this file.
# Secrets (sync: false) are entered once in the Render dashboard, never committed.
services:
  - type: web
    name: creator-rag-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Neon connection string. Use the +psycopg driver and keep sslmode=require:
      #   postgresql+psycopg://USER:PASSWORD@HOST/DB?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Groq (or any OpenAI-compatible) API key.
      - key: LLM_API_KEY
        sync: false
      # Comma-separated allowed origins — set to your Vercel URL after deploy,
      # e.g. https://creator-rag.vercel.app
      - key: CORS_ORIGINS
        sync: false
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: ROUTER_MODEL
        value: llama-3.3-70b-versatile
      - key: SYNTHESIS_MODEL
        value: llama-3.3-70b-versatile
      - key: SYNTHESIS_MAX_TOKENS
        value: "1024"
      - key: TRANSCRIBE_PROVIDER
        value: groq
      - key: GROQ_WHISPER_MODEL
        value: whisper-large-v3-turbo
      - key: IG_PROVIDER
        value: instaloader
      - key: EMBEDDING_MODEL
        value: BAAI/bge-small-en-v1.5
